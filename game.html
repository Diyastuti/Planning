<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Bros KW Super</title>
    <style>
        body {
            margin: 0;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }
        canvas {
            background: #5c94fc; /* Warna langit Mario */
            border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        p {
            margin-top: 15px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 10px;">Mario Simpel JS</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <p>Gunakan tombol <b>A / D</b> atau <b>Panah Kanan / Kiri</b> untuk jalan, dan <b>Spasi / W</b> untuk lompat!</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Karakter Mario (Kotak Merah dulu ya, hehe)
        let player = {
            x: 50,
            y: 300,
            width: 30,
            height: 30,
            speed: 5,
            velX: 0,
            velY: 0,
            jumping: false,
            ground: 320
        };

        let keys = {};
        let gravity = 0.6;

        // Deteksi input keyboard
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            // Gerak kanan-kiri
            if (keys['ArrowRight'] || keys['KeyD']) {
                player.velX = player.speed;
            } else if (keys['ArrowLeft'] || keys['KeyA']) {
                player.velX = -player.speed;
            } else {
                player.velX = 0;
            }

            // Lompat
            if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && !player.jumping) {
                player.velY = -12;
                player.jumping = true;
            }

            // Gravitasi
            player.velY += gravity;
            player.x += player.velX;
            player.y += player.velY;

            // Batas tanah (biar gak jatuh ke jurang tak terbatas)
            if (player.y >= player.ground) {
                player.y = player.ground;
                player.velY = 0;
                player.jumping = false;
            }

            // Batas layar kanan-kiri
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        }

        function draw() {
            // Hapus layar sebelumnya
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Gambar Tanah (Cokelat)
            ctx.fillStyle = '#fcb444';
            ctx.fillRect(0, 350, canvas.width, 50);

            // Gambar Rumput Hijau di atas tanah
            ctx.fillStyle = '#00a800';
            ctx.fillRect(0, 350, canvas.width, 10);

            // Gambar Mario (Kotak Merah dengan Topi)
            ctx.fillStyle = '#ff0000'; // Baju merah
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = '#0000ff'; // Celana biru
            ctx.fillRect(player.x + 5, player.y + 15, player.width - 10, 15);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Jalankan game
        gameLoop();
    </script>
</body>
</html>
